## 6. 기능 범위

## 6.1 1차 MVP: Python 반려생활 의도 분석 API

사용자가 입력한 문장을 분석하여 의도 도메인, 추천 카테고리, 의도 태그를 반환한다.

### 요청 예시

```http id="5ys8ro"
POST http://localhost:8000/api/pet-intent/analyze
Content-Type: application/json
```

```json id="gsyo82"
{
  "text": "우리 강아지가 귀를 자꾸 긁어요",
  "petType": "DOG"
}
```

### 응답 예시

```json id="09hd96"
{
  "intentDomain": "MEDICAL",
  "intent": "MEDICAL_CONCERN",
  "recommendedCategories": ["동물병원"],
  "confidence": 0.87,
  "keywords": ["강아지", "귀", "긁다"],
  "intentTags": ["ear", "itching", "skin"],
  "urgency": "NORMAL",
  "message": "귀/피부 관련 불편 표현이 감지되어 동물병원 카테고리를 추천합니다."
}
```

---

## 6.2 2차 MVP: Spring 연동 API

Spring에서 사용자 입력을 받아 Python 서버를 호출한 뒤, LocationService 검색 결과와 조합한다.

### 요청 예시

```http id="bn2fh4"
GET http://localhost:8080/api/pet-recommend?lat=37.501&lng=127.039&text=우리 강아지가 귀를 자꾸 긁어요&radius=3000
```

### 처리 흐름

```text id="usw2u2"
1. Spring이 text, lat, lng, radius 수신
2. 로그인 사용자 정보 조회
3. 사용자의 반려동물 정보 조회
4. Python FastAPI 서버 호출
5. recommendedCategories = [동물병원] 수신
6. LocationService에서 추천 카테고리 기준 반경 검색
7. 추천 점수 계산
8. 최종 응답 반환
```

### 응답 예시

```json id="bxmjen"
{
  "requestText": "우리 강아지가 귀를 자꾸 긁어요",
  "analysis": {
    "intentDomain": "MEDICAL",
    "intent": "MEDICAL_CONCERN",
    "recommendedCategories": ["동물병원"],
    "confidence": 0.87,
    "intentTags": ["ear", "itching", "skin"]
  },
  "message": "귀/피부 관련 불편 표현이 감지되어 가까운 동물병원을 추천합니다. 정확한 진단은 수의사 상담이 필요합니다.",
  "facilities": [
    {
      "id": 101,
      "name": "OO동물병원",
      "address": "서울 강남구 ...",
      "distanceM": 720,
      "rating": 4.7,
      "reviewCount": 84,
      "finalScore": 91.2,
      "matchReasons": [
        "nearby",
        "high_rating",
        "tag_match:ear"
      ]
    }
  ]
}
```

