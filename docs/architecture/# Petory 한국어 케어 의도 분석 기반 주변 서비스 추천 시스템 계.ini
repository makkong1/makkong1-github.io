# Petory 한국어 반려생활 의도 분석 기반 주변 서비스 추천 시스템 계획서  
## 로컬 개발 환경 기준

## 1. 프로젝트 개요

Petory는 반려동물 보호자를 위한 위치 기반 주변 서비스 탐색 기능을 제공한다. 
기존에는 사용자가 직접 카테고리를 선택한 뒤 현재 위치 기준으로 동물병원, 미용, 카페, 호텔, 용품점 등의 주변 서비스를 조회하는 방식이었다.

하지만 실제 사용자는 항상 정확한 카테고리를 알고 검색하지 않는다. 
예를 들어 “우리 강아지가 귀를 자꾸 긁어요”, “고양이가 밥을 잘 안 먹어요”, “강아지 털이 너무 엉켰어요”처럼 상황 중심으로 입력할 수 있다.

따라서 본 기능은 사용자의 한국어 자연어 입력을 Python 서버에서 분석하여 반려생활 의도를 파악하고, Spring 서버가 해당 분석 결과를 기반으로 위치 기반 주변 서비스를 추천하는 것을 목표로 한다.

본 계획은 배포 환경이 아닌 **로컬 개발 환경**을 기준으로 한다. 배포는 예정사항이니까 먼저 로컬 개발 환경을 검증한다. 하지만 배포를 위한 준비는 배포 환경에서 진행한다.

---

## 2. 핵심 목표

본 기능의 핵심은 “AI가 진단한다”가 아니라, 사용자의 자연어 입력을 서비스 검색 조건으로 변환하는 것이다.

예시 흐름은 다음과 같다.

```text id="xszqqb"
사용자 입력:
"우리 강아지가 귀를 자꾸 긁어요"

Python 분석 결과:
- 의도: MEDICAL_CONCERN
- 의도 도메인: MEDICAL
- 추천 카테고리: 동물병원
- 의도 태그: ear, itching, skin
- 긴급도: NORMAL

Spring 처리:
- 사용자 위치 기준 반경 검색
- category = 동물병원
- 장소 기본 점수, 거리, 평점, 리뷰 수, 태그 매칭 점수 조합
- 추천 결과 반환
```

이 기능은 의료 진단 기능이 아니라, 사용자의 상황을 바탕으로 적절한 서비스 카테고리를 추천하는 **반려생활 의도 분석 기능**이다.

