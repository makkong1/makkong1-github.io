```

---

## 10.3 Python 서버 장애 테스트

Python 서버를 끈 상태에서 Spring API를 호출한다.

기대 결과:

```text id="h0er9x"
- Spring 서버가 500으로 바로 터지지 않음
- fallback 로직 수행
- 키워드 기반 단순 카테고리 추론 또는 기본 검색 결과 반환
```

예시 응답 메시지:

```text id="fb8s35"
현재 반려생활 의도 분석 서버가 응답하지 않아 기본 검색 결과를 제공합니다.
```

---

## 11. 로컬 개발에서의 예외 처리

## 11.1 Python 서버 미실행

Spring에서 Python 서버 호출 실패 시 fallback 처리한다.

```text id="5osoy0"
Connection refused
Read timeout
5xx 응답
```

처리 방식:

```text id="qgbv5e"
1. 에러 로그 기록
2. keyword 기반 단순 카테고리 추론 시도
3. 실패 시 기본 location 검색 안내
```

---

## 11.2 confidence 낮음

Python 분석 결과 confidence가 낮으면 강제로 추천하지 않는다.

```json id="2a9rk7"
{
  "confidence": 0.42,
  "recommendedCategories": [],
  "suggestedCategories": ["동물병원", "미용", "반려동물용품"]
}
```

Spring은 이 경우 사용자에게 카테고리 선택을 유도할 수 있다.

---

## 11.3 의료 안전 문구

의료 관련 의도가 감지되면 반드시 다음 문구를 포함한다.

```text id="wjjdiy"
정확한 진단은 수의사 상담이 필요합니다.
증상이 심하거나 지속된다면 가까운 동물병원에 문의하세요.
```

---

## 11.4 개인정보 고지 및 동의

사용자 입력을 분석해 개인화 추천에 활용하는 기능은 실제 배포 시 사전 고지와 동의가 필요하다.
특히 커뮤니티 글, 케어 요청, 검색어에는 반려동물 건강 상태나 생활 정보가 포함될 수 있으므로 최소 수집 원칙을 적용한다.

로컬 MVP 기준 정책은 다음과 같다.

```text
- 사용자 입력 원문은 추천 signal 저장소에 저장하지 않는다.
- 저장 대상은 intentDomain, intent, recommendedCategories, intentTags, confidence, sourceType, expiresAt 등 분석 결과로 제한한다.
- signal은 짧은 TTL을 둔다. 예: 7일 또는 30일
- 의료 관련 의도는 진단이 아니라 주변 서비스 추천 목적으로만 사용한다.
```

실제 배포 시 필요한 항목은 다음과 같다.

```text
- 개인정보처리방침에 입력 데이터 분석 및 추천 활용 목적 명시
- 개인화 추천 사용 여부에 대한 UI 고지 또는 설정 제공
- 사용자가 개인화 추천을 끄면 이후 signal 저장 중단
- 기존 signal 삭제 또는 만료 처리
- 보관 기간과 철회 방법 명시
```

