## 5.5 React 로컬 호출 흐름

React는 직접 Python 서버를 호출하지 않는다.

```text id="gzk4yo"
React
→ Spring /api/pet-recommend
→ Python /api/pet-intent/analyze
→ Spring LocationService 검색
→ React 응답
```

이렇게 하는 이유는 다음과 같다.

```text id="z1h1no"
- 인증 사용자 정보는 Spring이 가지고 있음
- 반려동물 정보도 Spring DB에 있음
- LocationService 검색도 Spring이 담당함
- Python 서버를 프론트에 직접 노출하지 않아도 됨
```

