## 6.3 사용자 반려생활 의도 signal 기반 추천

전용 자연어 검색창을 새로 만드는 방식은 현재 Petory 사용 흐름과 어색할 수 있다.
따라서 실제 진입점은 사용자가 이미 작성하는 자유 텍스트를 활용한다.
여기서 말하는 의도는 의료/돌봄만 의미하지 않는다.
미용, 용품, 사료/간식, 산책/외출, 식당/카페, 호텔/위탁, 문화공간까지 포함하는 반려생활 의도이다.

수집 대상은 다음과 같다.

```text
- 커뮤니티 질문 게시글 title/content
- 케어 요청 title/description
- 주변서비스 keyword 검색어
```

단, 로컬 MVP에서도 사용자 입력 원문을 장기 저장하지 않는다.
Spring은 Python 분석 결과 중 추천에 필요한 신호만 저장한다.

```json
{
  "userId": 1,
  "sourceType": "COMMUNITY",
  "sourceId": 101,
  "intentDomain": "MEDICAL",
  "intent": "MEDICAL_CONCERN",
  "recommendedCategories": ["동물병원"],
  "intentTags": ["ear", "itching", "skin"],
  "confidence": 0.87,
  "createdAt": "2026-05-30T12:00:00",
  "expiresAt": "2026-06-06T12:00:00"
}
```

의도 도메인과 LocationService 카테고리는 다음처럼 매핑한다.
추천 카테고리는 현재 Petory의 `category1`, `category2`, `category3` 문자열과 맞춰야 한다.

```text
MEDICAL          → 동물병원, 동물약국
GROOMING         → 미용
SUPPLIES         → 반려동물용품
FOOD_SNACK       → 반려동물용품
WALK_OUTING      → 여행지, 반려동반여행
CAFE_DINING      → 카페, 식당
LODGING_TRAVEL   → 호텔, 펜션
DAYCARE_BOARDING → 위탁관리
CULTURE_SPACE    → 반려문화시설, 미술관, 박물관, 문예회관
```

현재 LocationService 데이터에 없는 세부 카테고리는 자동 필터로 쓰지 않는다.
예를 들어 별도 `공원` 카테고리가 없다면 `산책할 곳` 의도는 `여행지` 또는 `반려동반여행`으로 넓게 추천하거나, 데이터 확장 후 활성화한다.

주변서비스 탭 진입 시 Spring은 최근 signal을 조회한다.
confidence가 충분히 높고 만료되지 않은 signal이 있으면 추천 카드를 노출한다.

```text
최근 입력을 바탕으로 추천
"귀/피부 관련 고민이 있어 보여요."
[근처 동물병원 보기]
```

MVP에서는 추천 카드를 우선 사용하고, 사용자가 클릭했을 때만 해당 카테고리 검색을 실행한다.
자동으로 카테고리를 바꾸면 사용자가 검색 결과 변화를 이해하기 어려울 수 있기 때문이다.

분석 타이밍은 사용자 액션 응답 경로와 분리한다.
게시글 작성, 케어 요청 작성, 주변서비스 검색은 기존 흐름대로 먼저 성공 처리하고, Spring 내부 이벤트를 발행한다.
이후 `@Async` 이벤트 리스너가 Python 분석 API를 호출하고, confidence 기준을 통과한 결과만 signal로 저장한다.

```text
1. CommunityPostCreatedEvent / CareRequestCreatedEvent / LocationSearchPerformedEvent 발행
2. @Async listener에서 Python /api/pet-intent/analyze 호출
3. 분석 성공 및 confidence 기준 통과 시 UserPetIntentSignal 저장
4. 분석 실패, timeout, 낮은 confidence는 로깅만 하고 원 사용자 액션에는 영향 없음
```

