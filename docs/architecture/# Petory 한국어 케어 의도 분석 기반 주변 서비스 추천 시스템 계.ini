## 14. 포트폴리오 어필 포인트

```text id="3m5qdj"
- Spring Boot와 FastAPI를 로컬 개발 환경에서 분리 실행하여 마이크로서비스 구조를 검증
- 한국어 자연어 입력을 서비스 카테고리와 의도 태그로 변환
- Python은 NLP 분석, Spring은 인증/DB/위치 검색으로 역할 분리
- LocationService 반경 검색과 NLP 분석 결과를 결합
- 사용자 입력 원문을 장기 저장하지 않고 반려생활 의도 signal만 활용하는 개인화 추천 구조
- 장애 시 fallback 처리로 서비스 안정성 고려
- 의료 진단이 아닌 반려생활 의도 분석으로 안전한 서비스 범위 설정

```

---

## 15. 최종 요약

본 기능은 사용자의 자연어 입력을 Python FastAPI 서버에서 분석하고, Spring 서버가 분석 결과를 기반으로 위치 기반 주변 서비스를 추천하는 구조이다.

로컬 개발 환경에서는 React, Spring Boot, Python FastAPI, MySQL을 각각 로컬 포트에서 실행하여 연동을 검증한다.

초기 목표는 “강아지가 귀를 긁어요 → 동물병원 카테고리 추론 → 내 주변 동물병원 추천” 플로우를 끝까지 완성하는 것이다.

배포나 운영 자동화는 1차 목표에 포함하지 않고, 로컬 환경에서 기능 흐름과 서버 간 연동 구조를 먼저 검증한다.
다만 실제 배포 시에는 사용자 입력 분석 및 개인화 추천 활용에 대한 사전 고지, 동의, opt-out, 보관 기간 정책을 별도로 마련해야 한다.
