## 4. 서버별 역할 분리

## 4.1 Spring Boot 서버

Spring 서버는 Petory의 메인 백엔드 서버로 유지한다.

담당 역할은 다음과 같다.

```text id="akdcl6"
- 사용자 인증/인가
- 사용자 및 반려동물 정보 조회
- LocationService DB 조회
- 위치 기반 반경 검색
- 카테고리 필터링
- 추천 점수 계산
- 추천 결과 DTO 조립
- 사용자 반려생활 의도 signal 저장 및 조회
- Python 서버 장애 시 fallback 처리
```

Spring 서버는 DB와 직접 연결되어 있으므로 최종 장소 조회, 트랜잭션 처리, 응답 조립은 Spring에서 담당한다.

---

## 4.2 Python FastAPI 서버

Python 서버는 자연어 분석에 집중한다.

담당 역할은 다음과 같다.

```text id="sri1et"
- 사용자 입력 문장 분석
- 한국어 형태소 분석
- 문장 임베딩 생성
- 의도 분류
- 의도 태그 추출
- 추천 카테고리 반환
```

Python 서버는 로컬에서 FastAPI로 실행하고, Spring 서버가 HTTP 요청으로 호출한다.

