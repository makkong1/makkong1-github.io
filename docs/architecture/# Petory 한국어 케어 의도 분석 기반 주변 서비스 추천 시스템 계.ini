## 9. 추천 점수 설계

최종 추천 점수는 Spring 서버에서 계산한다.

Python은 자연어 분석 결과만 반환하고, Spring은 DB 조회 결과와 조합하여 최종 점수를 만든다.

```text id="vm18pe"
final_score =
  place_score      * 0.35
+ tag_match_score  * 0.30
+ distance_score   * 0.20
+ rating_score     * 0.10
+ review_score     * 0.05
```

