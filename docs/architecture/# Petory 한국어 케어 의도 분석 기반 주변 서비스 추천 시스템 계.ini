 ├─ dto/
 │   ├─ PetIntentAnalyzeRequest.java
 │   ├─ PetIntentAnalyzeResponse.java
 │   ├─ PetRecommendResponse.java
 │   └─ UserPetIntentSignalResponse.java
 ├─ entity/
 │   └─ UserPetIntentSignal.java
 ├─ repository/
 │   └─ UserPetIntentSignalRepository.java
 ├─ event/
 │   ├─ CommunityPostCreatedEvent.java
 │   ├─ CareRequestCreatedEvent.java
 │   └─ LocationSearchPerformedEvent.java
 └─ scoring/
     └─ PetRecommendScoreCalculator.java
```

signal 저장 테이블은 원문 텍스트를 저장하지 않는다.

```sql
CREATE TABLE user_pet_intent_signal (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    user_idx BIGINT NOT NULL,
    source_type VARCHAR(30) NOT NULL,
    source_id BIGINT NULL,
    intent_domain VARCHAR(50) NOT NULL,
    intent VARCHAR(50) NOT NULL,
    recommended_categories JSON NULL,
    confidence DOUBLE NOT NULL,
    intent_tags JSON NULL,
    created_at DATETIME NOT NULL,
    expires_at DATETIME NOT NULL,
    INDEX idx_user_signal_active (user_idx, expires_at, created_at),
    INDEX idx_signal_source (source_type, source_id)
);
```

