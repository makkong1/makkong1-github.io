# GitHub Pages 공식 배포 (gh-pages 브랜치 직접 push 없음).
#
# Pages 설정: Settings → Pages → Source →「GitHub Actions」 (브랜치/gh-pages 전용이면 이 워크플로와 별개입니다)
# PR에서 배포 대신 빌드만: .github/workflows/build.yml
#
# main 푸시 후 여기 run이 전혀 안 생기면 저장소 쪽을 먼저 본다:
#   Settings → Actions → General → Actions permissions (Disable 아님 · 외부 액션 허용 등)
# 복구 시 수동: Actions → Deploy to GitHub Pages → Run workflow

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
